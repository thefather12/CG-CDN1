worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream backend_server {
        # '127.0.0.1' apunta a tu binario /server dentro del mismo contenedor
        # Asegúrate de que tu binario escuche en el puerto 80
        server 127.0.0.1:80;
    }

    server {
        # Puerto que Cloud Run exige
        listen 8080;
        
        # Nombre del host (puedes usar '_' para aceptar cualquier host que llegue)
        server_name _;

        location / {
            proxy_pass http://backend_server;
            
            # Configuraciones críticas para que el Payload funcione:
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Pasar los headers originales para que el binario sepa quién conecta
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Ajustes de tiempo para que no se corte la conexión del túnel rápido
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
    }
}
