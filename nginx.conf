worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream my_binary {
        # El binario debe escuchar en el puerto 80 interno
        server 127.0.0.1:80;
    }

    server {
        # Puerto obligatorio que Cloud Run asigna (8080)
        listen 8080;
        server_name _;

        location / {
            proxy_pass http://my_binary;
            
            # Configuraciones vitales para Payloads de Túneles/WebSockets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Headers para que el binario reciba la IP real del usuario
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Timeouts largos para que el túnel no se desconecte
            proxy_connect_timeout 75s;
            proxy_read_timeout 300s;
        }
    }
}
