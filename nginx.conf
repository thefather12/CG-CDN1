worker_processes auto;
events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr;

    upstream backend_binario {
        # Importante: El binario 'server' debe usar el puerto 80
        server 127.0.0.1:80;
    }

    server {
        # Puerto requerido por Cloud Run
        listen 8080;
        server_name _;

        location / {
            proxy_pass http://backend_binario;
            
            # Soporte para Websockets y Payloads de túnel
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Headers de Host e IP
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Evita que Cloud Run corte la conexión rápido
            proxy_read_timeout 300s;
        }
    }
}
